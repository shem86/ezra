name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: hh
          POSTGRES_PASSWORD: hh
          POSTGRES_DB: hh_assistant
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hh -d hh_assistant"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://hh:hh@localhost:5432/hh_assistant
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test
      # The M3 reliability gate (T24): the named recovery/exactly-once/
      # debounce/FIFO/execute-once tests as one suite. Overlaps `pnpm test`
      # by design — this is the gate's named, green-in-CI invocation.
      - run: pnpm test:recovery
