# Production runtime sandbox (T16). The decision (CLAUDE.md / infra/host.md):
# Docker Compose for the PROCESS sandbox + host-level nftables for egress
# (infra/egress/nftables.sh) — Docker's own iptables churn fights host
# nftables, so egress enforcement stays off the container layer on purpose.
#
# The ezra image is PULLED from GHCR (built+pushed by CI, .github/workflows/
# ci.yml) — the host never compiles from source. The tag is chosen by
# EZRA_TAG (an immutable :sha-<short> or :<version>); it defaults to :latest.
# Production swaps are driven by infra/deploy/on-host-deploy.sh (CD: deploy.yml).
#
# Run from the repo root, pull-based (host / CD):
#   EZRA_TAG=<tag> docker compose --env-file .env -f infra/docker-compose.prod.yml pull ezra
#   EZRA_TAG=<tag> docker compose --env-file .env -f infra/docker-compose.prod.yml up -d
# To build locally instead of pulling, add the override that restores `build:`:
#   docker compose -f infra/docker-compose.prod.yml -f infra/docker-compose.build.yml up -d --build
# Secrets are injected at runtime from ../.env (gitignored, never in the image).
#
# Hardening summary:
#  - ezra: read-only rootfs, all caps dropped, no-new-privileges, non-root;
#    the ONLY writable surfaces are the wa-session volume and a tmpfs /tmp.
#  - postgres: not read-only (it needs many writable paths); the sensitive
#    surface — the data dir — is a named volume, the port is NOT published, and
#    it sits on an internal-only network with no route to the internet.

# Fixed project name so volume/network names are stable across invocations
# (otherwise they'd take the compose file's parent dir, `infra_*`). The egress
# network additionally pins its kernel bridge interface name (see `networks:`
# below) so the nftables allowlist matches a STATIC iifname.
name: hh-assistant

services:
  ezra:
    # Pulled from GHCR; never built on the host (build: lives in the
    # docker-compose.build.yml override for local dev). EZRA_TAG selects the
    # immutable tag CI pushed; :latest is the fallback for a manual `up`.
    image: ghcr.io/shem86/hh-assistant:${EZRA_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Runtime secrets (ANTHROPIC_API_KEY, VOYAGE_API_KEY, GOOGLE_SA_KEY_B64,
    # LANGFUSE_*, ALERT_CHANNEL_*, WA_JID_*, …) — see .env.example.
    env_file:
      - ../.env
    environment:
      # Compose-internal wiring overrides anything in .env (environment wins):
      # the app reaches Postgres over the internal network, and the session
      # lives on the one writable app volume below.
      DATABASE_URL: postgres://hh:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/hh_assistant_prod
      WA_SESSION_DIR: /data/wa-session
    # --- process sandbox ------------------------------------------------------
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "1000:1000" # the image's `node` user
    tmpfs:
      - /tmp
    volumes:
      # Baileys session is the ONLY app-writable persistent surface. Never
      # backed up / restored (SPEC "Never" — re-pair on loss).
      - wa-session:/data/wa-session
    networks:
      - internal # to Postgres
      - egress # to the internet (host nftables filters it to the allowlist)

  # The read-only operations console — SAME image, different entry. A separate
  # process from the spine (never inside it). Reachable only over the tailnet:
  # the port is published on LOOPBACK ONLY (127.0.0.1), and `tailscale serve` on
  # the host fronts it with the *.ts.net HTTPS cert — so no public ingress (the
  # SG stays SSH-only). Connects to Postgres through the SELECT-only role
  # (BACKOFFICE_DATABASE_URL in .env points at postgres:5432 with hh_readonly).
  backoffice:
    image: ghcr.io/shem86/hh-assistant:${EZRA_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "dist/backoffice/cli.js"]
    # Same runtime secrets file as the spine (Langfuse/Anthropic/Voyage/GCal for
    # the probes + costs), plus the backoffice-only vars (token, SELECT-only URL,
    # budget) — all from .env (SSM-delivered).
    env_file:
      - ../.env
    environment:
      BACKOFFICE_PORT: "8787"
      BACKOFFICE_DIST_DIR: /app/backoffice/dist
    # Loopback-only publish — tailscale serve (host) proxies tailnet → here.
    ports:
      - "127.0.0.1:8787:8787"
    # --- process sandbox (same hardening as the spine; the console writes
    # NOTHING — read-only product on a read-only rootfs) ----------------------
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    tmpfs:
      - /tmp
    networks:
      - internal # to Postgres (SELECT-only role)
      - egress # to Langfuse/Anthropic/Voyage/Google Calendar reads

  postgres:
    image: pgvector/pgvector:pg17
    container_name: hh-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: hh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: hh_assistant_prod
    security_opt:
      - no-new-privileges:true
    # No `ports:` — the DB is never exposed to the host or the internet.
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hh -d hh_assistant_prod"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  internal:
    internal: true # no route to the internet; app⇄postgres only
  egress:
    driver: bridge
    driver_opts:
      # Pin the kernel bridge interface name so the host nftables allowlist
      # (infra/egress/nftables.sh) matches a STATIC iifname instead of
      # re-deriving br-<network-id> via `docker network inspect` at every
      # apply/refresh (V2_NOTES §5). Must be ≤15 chars (Linux IFNAMSIZ).
      # Takes effect when the network is (re)created — i.e. the next
      # `compose down && up`, not on a running stack.
      com.docker.network.bridge.name: hh-egress0

volumes:
  wa-session:
  pgdata:
