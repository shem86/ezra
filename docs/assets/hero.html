<!doctype html>
<meta charset="utf-8" />
<title>Ezra — hero</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hanken Grotesk', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .hero { width: 1280px; height: 400px; position: relative; overflow: hidden;
          background:
            radial-gradient(120% 140% at 82% -10%, #f3e6d8 0%, transparent 46%),
            radial-gradient(90% 120% at 12% 120%, #efe3d5 0%, transparent 50%),
            #f7f1e9;
          display: flex; align-items: center; padding: 0 76px; }
  .hero::after { content: ''; position: absolute; inset: 0;
                 background-image: linear-gradient(#00000008 1px, transparent 1px),
                                   linear-gradient(90deg, #00000008 1px, transparent 1px);
                 background-size: 34px 34px; -webkit-mask-image: radial-gradient(80% 80% at 70% 30%, #000, transparent 75%); }
  .left { position: relative; z-index: 2; max-width: 720px; }
  .lock { display: flex; align-items: center; gap: 22px; margin-bottom: 22px; }
  .mark { width: 96px; height: 96px; border-radius: 24px; background: linear-gradient(150deg, #c9772f, #a8501f);
          display: flex; align-items: center; justify-content: center; color: #fff; font-size: 62px; font-weight: 700;
          box-shadow: 0 18px 34px -10px rgba(150,70,25,.55); }
  .word { font-size: 74px; font-weight: 800; color: #3a2a1c; letter-spacing: -1.5px; line-height: 1; }
  .heb { color: #c9772f; font-weight: 700; }
  .tag { font-size: 24px; color: #6a5646; font-weight: 500; line-height: 1.4; max-width: 640px; }
  .tag b { color: #3a2a1c; font-weight: 700; }
  .chips { display: flex; gap: 10px; margin-top: 26px; flex-wrap: wrap; }
  .chip { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; color: #7a5a3c;
          background: #fff; border: 1px solid #e6d5c2; padding: 7px 14px; border-radius: 999px;
          box-shadow: 0 2px 4px rgba(120,80,40,.06); }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #4a9e6d; margin-right: 7px; vertical-align: middle; }
</style>
<div class="hero">
  <div class="left">
    <div class="lock">
      <div class="mark">ע</div>
      <div class="word">Ezra <span class="heb">עזרא</span></div>
    </div>
    <div class="tag">A <b>production-grade</b> WhatsApp household assistant — durable,
      human-in-the-loop, and <b>live</b> for a real family in Hebrew &amp; English.</div>
    <div class="chips">
      <span class="chip"><span class="dot"></span>live in production</span>
      <span class="chip">DBOS durable execution</span>
      <span class="chip">Claude · AI SDK</span>
      <span class="chip">Postgres + pgvector</span>
      <span class="chip">~$9/mo</span>
    </div>
  </div>
</div>
